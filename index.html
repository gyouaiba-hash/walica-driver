<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドライブ割り勘 (Walica風)</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f9f9f9; color: #333; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        h1 { text-align: center; color: #e97a6d; font-style: italic; font-size: 24px; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 15px; }
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px;
        }
        .row { display: flex; gap: 10px; }
        .row input { flex: 2; margin-bottom: 0; }
        .row select { flex: 1.5; margin-bottom: 0; }
        
        button { width: 100%; padding: 14px; border: none; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-add { background-color: #f2e2e0; color: #e97a6d; flex: 1; }
        .btn-primary { background-color: #e97a6d; color: white; margin-top: 20px; }
        .btn-outline { background-color: white; color: #333; border: 1px solid #ddd; margin-top: 10px; }
        
        .member-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .tag { background: #f0f0f0; padding: 5px 12px; border-radius: 20px; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .tag span { color: #888; cursor: pointer; font-weight: bold; }

        .expense-card { border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 20px; background: #fafafa; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
        .checkbox-group label { display: flex; align-items: center; gap: 5px; background: #fff; padding: 5px 10px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; cursor: pointer; }
        .checkbox-group input:checked + span { color: #e97a6d; font-weight: bold; }
        
        .inline-text { text-align: center; font-weight: bold; margin: 10px 0; color: #555; }
        
        .result-box { background: #fdf2f1; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .payment-list { list-style: none; padding: 0; }
        .payment-list li { padding: 10px 0; border-bottom: 1px dashed #ccc; font-size: 16px; }
        .payment-list li:last-child { border-bottom: none; }
        .bold-red { color: #e97a6d; font-weight: bold; }

        #screen-main, #screen-result { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Walica風 ドライブ</h1>

    <div id="screen-setup">
        <h3 style="text-align: center; font-size: 16px;">メンバーを追加</h3>
        <div class="row">
            <input type="text" id="memberName" placeholder="名前 (例: あおい)">
            <select id="memberRole">
                <option value="driver">🚗 運転手</option>
                <option value="passenger" selected>🧍 同乗者</option>
            </select>
            <button class="btn-add" onclick="addMember()">追加</button>
        </div>
        <div class="member-tags" id="memberList"></div>
        <button class="btn-primary" onclick="goToMain()">グループを作成</button>
    </div>

    <div id="screen-main">
        <div class="expense-card">
            <div class="form-group">
                <select id="payerSelect"></select>
                <div class="inline-text">が</div>
            </div>
            
            <div style="font-size: 14px; margin-bottom: 5px; color: #666;">誰の分？ (対象者のチェックを入れる)</div>
            <div class="checkbox-group" id="involvedCheckboxes"></div>
            
            <div class="inline-text">の</div>
            
            <div class="form-group">
                <input type="text" id="expenseDesc" placeholder="何代？ (例: 高速代、ランチ代)">
                <div class="inline-text">を払って、</div>
            </div>
            
            <div class="form-group">
                <input type="number" id="expenseAmount" placeholder="￥ 0">
                <div class="inline-text">かかった。</div>
            </div>

            <div class="form-group" style="background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                <label style="font-size: 14px; color: #666; display: block; margin-bottom: 5px; font-weight: bold;">割り勘の割合</label>
                <select id="splitMethod" style="margin-bottom: 0; border: none; background: #f9f9f9;">
                    <option value="equal">🍽️ 均等割り（食事代など全員1:1）</option>
                    <option value="drive">🚗 車代（運転手1 : 同乗者2）</option>
                </select>
            </div>
            
            <button class="btn-primary" onclick="addExpense()">登録</button>
        </div>

        <div id="expenseHistory" style="margin-bottom: 20px;"></div>

        <button class="btn-primary" style="background-color: #4CAF50;" onclick="calculateSettlement()">精算結果を見る</button>
        <button class="btn-outline" onclick="location.reload()">最初からやり直す</button>
    </div>

    <div id="screen-result">
        <h2 style="text-align: center; color: #e97a6d;">精算結果</h2>
        <div class="result-box">
            <ul class="payment-list" id="settlementList"></ul>
        </div>
        <button class="btn-outline" onclick="backToMain()">戻る</button>
    </div>

</div>

<script>
    let members = [];
    let expenses = [];
    let memberIdCounter = 0;

    function addMember() {
        const nameInput = document.getElementById('memberName');
        const roleSelect = document.getElementById('memberRole');
        const name = nameInput.value.trim();
        const role = roleSelect.value; // 'driver' or 'passenger'

        if (!name) return alert("名前を入力してください");

        members.push({ id: memberIdCounter++, name: name, role: role });
        nameInput.value = '';
        renderMembers();
    }

    function removeMember(id) {
        members = members.filter(m => m.id !== id);
        renderMembers();
    }

    function renderMembers() {
        const list = document.getElementById('memberList');
        list.innerHTML = '';
        members.forEach(m => {
            const roleText = m.role === 'driver' ? '🚗' : '🧍';
            list.innerHTML += `<div class="tag">${roleText} ${m.name} <span onclick="removeMember(${m.id})">×</span></div>`;
        });
    }

    function goToMain() {
        if (members.length < 2) return alert("精算には2人以上のメンバーが必要です");
        document.getElementById('screen-setup').style.display = 'none';
        document.getElementById('screen-main').style.display = 'block';
        updateExpenseForm();
    }

    function updateExpenseForm() {
        const payerSelect = document.getElementById('payerSelect');
        const checkboxes = document.getElementById('involvedCheckboxes');
        
        payerSelect.innerHTML = '';
        checkboxes.innerHTML = '';

        members.forEach(m => {
            payerSelect.innerHTML += `<option value="${m.id}">${m.name}</option>`;
            checkboxes.innerHTML += `<label><input type="checkbox" value="${m.id}" checked><span>${m.name}</span></label>`;
        });
    }

    function addExpense() {
        const payerId = parseInt(document.getElementById('payerSelect').value);
        const desc = document.getElementById('expenseDesc').value.trim() || '無名';
        const amount = parseInt(document.getElementById('expenseAmount').value);
        const splitMethod = document.getElementById('splitMethod').value; // 'equal' or 'drive'
        
        const involvedCheckboxes = document.querySelectorAll('#involvedCheckboxes input:checked');
        const involvedIds = Array.from(involvedCheckboxes).map(cb => parseInt(cb.value));

        if (!amount || amount <= 0) return alert("金額を正しく入力してください");
        if (involvedIds.length === 0) return alert("対象者を1人以上選んでください");

        const payer = members.find(m => m.id === payerId);
        expenses.push({ payerId, payerName: payer.name, desc, amount, involvedIds, splitMethod });

        document.getElementById('expenseDesc').value = '';
        document.getElementById('expenseAmount').value = '';
        
        renderExpenseHistory();
    }

    function renderExpenseHistory() {
        const historyDiv = document.getElementById('expenseHistory');
        historyDiv.innerHTML = '<h4 style="margin-bottom:5px;">登録済みの支払い</h4>';
        expenses.forEach((e) => {
            const splitBadge = e.splitMethod === 'drive' 
                ? '<span style="color:#e97a6d; font-size:12px; font-weight:bold;">[車 1:2]</span>' 
                : '<span style="color:#3498db; font-size:12px; font-weight:bold;">[均等 1:1]</span>';

            historyDiv.innerHTML += `<div style="font-size:14px; border-bottom:1px solid #eee; padding:5px 0;">
                ${e.payerName} が <strong>${e.desc}</strong> で ￥${e.amount.toLocaleString()} 支払いました ${splitBadge}
            </div>`;
        });
    }

    function calculateSettlement() {
        if (expenses.length === 0) return alert("支払いが登録されていません");

        let balances = {};
        members.forEach(m => balances[m.id] = 0);

        expenses.forEach(exp => {
            balances[exp.payerId] += exp.amount;

            let totalWeight = 0;
            // 支払いごとの重みを計算
            exp.involvedIds.forEach(id => {
                const member = members.find(m => m.id === id);
                // 均等割りなら全員「1」、車代なら運転手「1」同乗者「2」
                let weight = (exp.splitMethod === 'drive' && member.role === 'passenger') ? 2 : 1;
                totalWeight += weight;
            });

            const unitPrice = exp.amount / totalWeight;

            // それぞれの負担分を引く
            exp.involvedIds.forEach(id => {
                const member = members.find(m => m.id === id);
                let weight = (exp.splitMethod === 'drive' && member.role === 'passenger') ? 2 : 1;
                balances[id] -= (unitPrice * weight);
            });
        });

        let debtors = [];
        let creditors = [];

        members.forEach(m => {
            let bal = Math.round(balances[m.id]); 
            if (bal < 0) debtors.push({ name: m.name, amount: -bal });
            else if (bal > 0) creditors.push({ name: m.name, amount: bal });
        });

        const resultList = document.getElementById('settlementList');
        resultList.innerHTML = '';

        if (debtors.length === 0 && creditors.length === 0) {
            resultList.innerHTML = '<li>🎉 立て替えはありません！</li>';
        } else {
            let i = 0, j = 0;
            while (i < debtors.length && j < creditors.length) {
                let debt = debtors[i].amount;
                let credit = creditors[j].amount;
                let min = Math.min(debt, credit);

                resultList.innerHTML += `<li>${debtors[i].name} <span style="color:#ccc;">➔</span> ${creditors[j].name} に <span class="bold-red">￥${min.toLocaleString()}</span></li>`;

                debtors[i].amount -= min;
                creditors[j].amount -= min;

                if (debtors[i].amount === 0) i++;
                if (creditors[j].amount === 0) j++;
            }
        }

        document.getElementById('screen-main').style.display = 'none';
        document.getElementById('screen-result').style.display = 'block';
    }

    function backToMain() {
        document.getElementById('screen-result').style.display = 'none';
        document.getElementById('screen-main').style.display = 'block';
    }
</script>

</body>
</html>
